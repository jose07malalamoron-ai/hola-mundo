<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nuestro Universo 💙</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
    background:black;
    overflow:hidden;
    font-family:'Segoe UI',sans-serif;
    color:white;
}

/* CANVAS FONDO */
canvas{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    z-index:-1;
}

/* CONTENEDOR */
.container{
    min-height:100vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    text-align:center;
    padding:20px;
}

/* MARCO CORAZÓN SVG */
.heart-wrapper{
    width:min(85vw,380px);
    position:relative;
    filter: drop-shadow(0 0 20px #66ccff)
            drop-shadow(0 0 40px #ff66cc);
    animation:pulse 2s infinite;
}

@keyframes pulse{
    0%{transform:scale(1);}
    50%{transform:scale(1.05);}
    100%{transform:scale(1);}
}

.poem{
    margin-top:30px;
    font-size:clamp(18px,4vw,26px);
    line-height:1.7;
    text-shadow:0 0 15px #66ccff,0 0 30px #ff66cc;
}

.love{
    margin-top:15px;
    font-size:clamp(28px,6vw,45px);
    background:linear-gradient(90deg,#66ccff,#ffffff,#ff66cc);
    background-size:300%;
    -webkit-background-clip:text;
    color:transparent;
    animation:shine 4s infinite linear;
}

@keyframes shine{
    0%{background-position:0%;}
    100%{background-position:300%;}
}
</style>
</head>
<body>

<canvas id="space"></canvas>

<div class="container">

<div class="heart-wrapper">
<svg viewBox="0 0 500 450" width="100%">
    <defs>
        <clipPath id="heartClip">
            <path d="M250 400 
                     C 100 280 0 200 0 120
                     C 0 50 50 0 120 0
                     C 180 0 250 80 250 80
                     C 250 80 320 0 380 0
                     C 450 0 500 50 500 120
                     C 500 200 400 280 250 400 Z"/>
        </clipPath>
    </defs>

    <image href="foto.jpg"
           width="500"
           height="450"
           preserveAspectRatio="xMidYMid slice"
           clip-path="url(#heartClip)" />
</svg>
</div>

<div class="poem">
    En un universo infinito lleno de estrellas,<br>
    encontré mi lugar… en tus brazos.<br><br>
    No eres solo mi amor,<br>
    eres mi destino, mi paz,<br>
    la razón por la que mi corazón late más fuerte cada día.<br><br>
    Si el cielo se apagara mañana,<br>
    mi luz seguiría brillando… porque eres tú 💙✨
</div>

<div class="love">TE AMOOOO 💙</div>

</div>

<script>
const canvas=document.getElementById("space");
const ctx=canvas.getContext("2d");

function resize(){
canvas.width=window.innerWidth;
canvas.height=window.innerHeight;
}
resize();
window.addEventListener("resize",resize);

/* ESTRELLAS */
let stars=[];
for(let i=0;i<250;i++){
stars.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
r:Math.random()*1.5,
speed:Math.random()*0.3
});
}

/* METEORITOS */
let meteors=[];
for(let i=0;i<15;i++){
meteors.push({
x:Math.random()*canvas.width,
y:Math.random()*-canvas.height,
len:Math.random()*80+50,
speed:Math.random()*6+4
});
}

/* COMETA */
let comet={x:-200,y:100,speed:5};

/* AGUJERO NEGRO */
let blackHole={
x:()=>canvas.width*0.8,
y:()=>canvas.height*0.3,
r:60
};

function drawStars(){
ctx.fillStyle="white";
stars.forEach(s=>{
ctx.beginPath();
ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
ctx.fill();
s.y+=s.speed;
if(s.y>canvas.height)s.y=0;
});
}

function drawMeteors(){
ctx.strokeStyle="rgba(255,255,255,0.8)";
ctx.lineWidth=2;
meteors.forEach(m=>{
ctx.beginPath();
ctx.moveTo(m.x,m.y);
ctx.lineTo(m.x-m.len,m.y-m.len);
ctx.stroke();

m.x+=m.speed;
m.y+=m.speed;

if(m.y>canvas.height){
m.x=Math.random()*canvas.width;
m.y=Math.random()*-200;
}
});
}

function drawComet(){
let tail=ctx.createLinearGradient(comet.x-100,comet.y,comet.x,comet.y);
tail.addColorStop(0,"rgba(255,0,0,0)");
tail.addColorStop(1,"yellow");

ctx.fillStyle=tail;
ctx.fillRect(comet.x-100,comet.y-5,100,10);

ctx.beginPath();
ctx.fillStyle="white";
ctx.arc(comet.x,comet.y,8,0,Math.PI*2);
ctx.fill();

comet.x+=comet.speed;
comet.y+=0.3;

if(comet.x>canvas.width+100){
comet.x=-200;
comet.y=Math.random()*200+50;
}
}

function drawBlackHole(){
let x=blackHole.x();
let y=blackHole.y();

let gradient=ctx.createRadialGradient(x,y,10,x,y,blackHole.r);
gradient.addColorStop(0,"black");
gradient.addColorStop(0.5,"purple");
gradient.addColorStop(1,"transparent");

ctx.beginPath();
ctx.fillStyle=gradient;
ctx.arc(x,y,blackHole.r,0,Math.PI*2);
ctx.fill();
}

function animate(){
ctx.clearRect(0,0,canvas.width,canvas.height);
drawStars();
drawMeteors();
drawComet();
drawBlackHole();
requestAnimationFrame(animate);
}
animate();
</script>

</body>
</html>
